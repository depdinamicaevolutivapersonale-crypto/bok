<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BOK — Barter of Knowledge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --orange: #FF6B35; --orange2: #FF8C42; --orange-bg: #FFF4EF;
  --green: #2ECC71; --green2: #27AE60; --green-bg: #EAFAF1;
  --purple: #9B59B6; --purple2: #8E44AD; --purple-bg: #F5EEF8;
  --yellow: #FFE066; --red: #E74C3C;
  --text: #2C3E50; --text2: #7F8C8D; --text3: #BDC3C7;
  --border: #ECF0F1; --surface: #F8F9FA; --white: #FFFFFF;
  --shadow: 0 2px 12px rgba(0,0,0,0.08); --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
}
html, body { height: 100%; background: #F0F2F5; font-family: 'Inter', sans-serif; }
#root { min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; }
.app { width: 100%; max-width: 430px; min-height: 100vh; background: var(--white); position: relative; overflow-x: hidden; }
@media (min-width: 430px) {
  #root { align-items: center; padding: 20px; min-height: 100vh; }
  .app { min-height: auto; max-height: 920px; overflow-y: auto; box-shadow: var(--shadow-lg); border-radius: 28px; }
}

/* ── SPLASH ── */
.splash { min-height: 100vh; background: linear-gradient(160deg, #FF6B35 0%, #E91E8C 45%, #9B59B6 80%, #6C3483 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 28px; position: relative; overflow: hidden; }
.splash::before { content: ''; position: absolute; top: -80px; right: -80px; width: 280px; height: 280px; background: rgba(255,255,255,0.06); border-radius: 50%; }
.splash::after { content: ''; position: absolute; bottom: -60px; left: -60px; width: 220px; height: 220px; background: rgba(255,255,255,0.05); border-radius: 50%; }
.splash-logo-wrap { text-align: center; margin-bottom: 12px; animation: fadeUp 0.8s ease 0.1s both; }
.splash-bok { font-family: 'Nunito', sans-serif; font-size: 96px; font-weight: 900; color: #fff; line-height: 1; letter-spacing: -4px; text-shadow: 0 4px 24px rgba(0,0,0,0.2); }
.splash-barter { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.9); letter-spacing: 0.05em; margin-top: -4px; }
.splash-italian { font-family: 'Inter', sans-serif; font-size: 13px; font-style: italic; color: rgba(255,255,255,0.6); margin-top: 4px; letter-spacing: 0.03em; }
.splash-divider { width: 60px; height: 3px; background: rgba(255,255,255,0.4); border-radius: 2px; margin: 24px auto; animation: fadeUp 0.8s ease 0.3s both; }
.splash-slogan { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 800; color: #fff; text-align: center; line-height: 1.35; margin-bottom: 12px; animation: fadeUp 0.8s ease 0.4s both; }
.splash-slogan em { color: var(--yellow); font-style: normal; }
.splash-sub { font-size: 14px; color: rgba(255,255,255,0.7); text-align: center; line-height: 1.6; margin-bottom: 48px; animation: fadeUp 0.8s ease 0.5s both; }
.splash-features { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; margin-bottom: 48px; animation: fadeUp 0.8s ease 0.6s both; }
.splash-feature { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 14px; padding: 12px 16px; }
.sf-icon { font-size: 22px; flex-shrink: 0; }
.sf-text { font-size: 13px; color: rgba(255,255,255,0.9); font-weight: 600; line-height: 1.4; }
.splash-btn { width: 100%; max-width: 340px; background: #fff; color: var(--orange); font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; padding: 18px; border: none; cursor: pointer; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); transition: all 0.2s; animation: fadeUp 0.8s ease 0.7s both; letter-spacing: 0.02em; }
.splash-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.25); }
.splash-btn:active { transform: scale(0.98); }
.splash-note { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 16px; text-align: center; animation: fadeUp 0.8s ease 0.8s both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* ── TOPBAR ── */
.topbar { background: var(--white); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 100; }
.logo-wrap { display: flex; flex-direction: column; }
.logo { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 900; background: linear-gradient(135deg, var(--orange), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
.logo-barter { font-size: 9px; color: var(--text2); font-weight: 600; margin-top: 1px; letter-spacing: 0.05em; }
.logo-italian { font-size: 8px; color: var(--text3); font-style: italic; }
.wallet { display: flex; align-items: center; gap: 6px; background: linear-gradient(135deg, var(--purple), #6C3483); padding: 7px 14px; border-radius: 20px; box-shadow: 0 3px 10px rgba(155,89,182,0.3); }
.wallet-val { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 900; color: #fff; }
.wallet-label { font-size: 10px; color: rgba(255,255,255,0.8); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
.pdots { display: flex; gap: 6px; }
.pdot { width: 26px; height: 5px; border-radius: 3px; background: var(--border); transition: all 0.3s; }
.pdot.active { background: var(--orange); }
.pdot.done { background: var(--green); }
.back-btn { width: 36px; height: 36px; background: var(--surface); border: 2px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--text2); flex-shrink: 0; }

/* ── CONTENT ── */
.content { padding: 24px 20px 48px; }
.step-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--orange-bg); border: 1.5px solid var(--orange); color: var(--orange); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; margin-bottom: 14px; }
.screen-title { font-family: 'Nunito', sans-serif; font-size: 28px; font-weight: 900; color: var(--text); line-height: 1.15; margin-bottom: 8px; }
.screen-sub { font-size: 14px; color: var(--text2); margin-bottom: 24px; line-height: 1.6; }
.field { margin-bottom: 16px; }
.field label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); margin-bottom: 7px; display: block; }
.field input, .field select, .field textarea { width: 100%; background: var(--surface); border: 2px solid var(--border); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; padding: 13px 16px; outline: none; border-radius: 14px; transition: all 0.2s; appearance: none; box-sizing: border-box; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--orange); background: var(--white); box-shadow: 0 0 0 4px rgba(255,107,53,0.1); }
.field input::placeholder { color: var(--text3); }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn { width: 100%; background: linear-gradient(135deg, var(--orange), var(--orange2)); color: #fff; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800; padding: 16px; border: none; cursor: pointer; border-radius: 16px; display: block; margin-top: 10px; transition: all 0.2s; box-shadow: 0 4px 14px rgba(255,107,53,0.35); }
.btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,107,53,0.4); }
.btn:active { transform: scale(0.98); }
.btn-green { background: linear-gradient(135deg, var(--green), var(--green2)); box-shadow: 0 4px 14px rgba(46,204,113,0.35); }
.btn-purple { background: linear-gradient(135deg, var(--purple), var(--purple2)); box-shadow: 0 4px 14px rgba(155,89,182,0.35); }
.btn-outline { width: 100%; background: transparent; border: 2px solid var(--border); color: var(--text2); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; padding: 14px; cursor: pointer; border-radius: 16px; display: block; margin-top: 10px; }
.divider { height: 1px; background: var(--border); margin: 20px 0; }
.note { font-size: 12px; color: var(--text3); text-align: center; margin-top: 12px; line-height: 1.5; }
.link-row { text-align: center; font-size: 14px; color: var(--text2); margin-top: 10px; }
.link-row span { color: var(--orange); font-weight: 700; cursor: pointer; }

/* ── KYC ── */
.kyc-box { background: var(--surface); border: 2px dashed var(--border); padding: 22px 16px; text-align: center; margin-bottom: 14px; cursor: pointer; border-radius: 18px; transition: all 0.2s; }
.kyc-box:hover { border-color: var(--orange); background: var(--orange-bg); transform: translateY(-1px); }
.kyc-box.done { border-color: var(--green); background: var(--green-bg); border-style: solid; }
.kyc-box.loading { border-color: var(--purple); background: var(--purple-bg); border-style: solid; }
.kyc-icon { font-size: 30px; margin-bottom: 10px; }
.kyc-label { font-size: 14px; color: var(--text2); font-weight: 600; line-height: 1.5; }
.kyc-note { font-size: 11px; color: var(--text3); display: block; margin-top: 4px; font-weight: 400; }

/* ── SKILLY REWARD ── */
.skilly-reward { background: linear-gradient(135deg, #6C3483, var(--purple)); border-radius: 20px; padding: 20px; margin-top: 16px; display: flex; align-items: center; gap: 16px; box-shadow: 0 6px 20px rgba(155,89,182,0.3); }
.skilly-reward-val { font-family: 'Nunito', sans-serif; font-size: 52px; font-weight: 900; color: #fff; line-height: 1; }
.sr-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.7); }
.sr-desc { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 4px; line-height: 1.4; font-weight: 500; }

/* ── PACCHETTI ── */
.pack-cards { display: flex; flex-direction: column; gap: 12px; margin: 16px 0; }
.pack-card { border: 2px solid var(--border); border-radius: 18px; padding: 16px; cursor: pointer; transition: all 0.2s; position: relative; background: var(--white); }
.pack-card:hover { border-color: var(--orange); transform: translateY(-1px); box-shadow: var(--shadow); }
.pack-card.selected { border-color: var(--orange); background: var(--orange-bg); box-shadow: 0 4px 16px rgba(255,107,53,0.2); }
.pack-card.selected-green { border-color: var(--green); background: var(--green-bg); box-shadow: 0 4px 16px rgba(46,204,113,0.2); }
.pack-card.selected-purple { border-color: var(--purple); background: var(--purple-bg); box-shadow: 0 4px 16px rgba(155,89,182,0.2); }
.pack-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.pack-name { font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800; color: var(--text); }
.pack-badge { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 10px; }
.pb-orange { background: var(--orange-bg); color: var(--orange); border: 1.5px solid var(--orange); }
.pb-green { background: var(--green-bg); color: var(--green2); border: 1.5px solid var(--green); }
.pb-purple { background: var(--purple-bg); color: var(--purple2); border: 1.5px solid var(--purple); }
.pack-price { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px; }
.pack-skilly { font-family: 'Nunito', sans-serif; font-size: 28px; font-weight: 900; color: var(--purple); }
.pack-unit { font-size: 12px; color: var(--text2); font-weight: 500; }
.pack-bonus { font-size: 12px; font-weight: 700; color: var(--green2); margin-bottom: 6px; }
.pack-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }
.pack-best { position: absolute; top: -10px; right: 14px; background: linear-gradient(135deg, var(--orange), var(--purple)); color: #fff; font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 8px; letter-spacing: 0.05em; }
.pack-check { position: absolute; top: 14px; right: 14px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.pc-orange { background: var(--orange); color: #fff; }
.pc-green { background: var(--green); color: #fff; }
.pc-purple { background: var(--purple); color: #fff; }

/* ── RIEPILOGO PACCHETTO ── */
.pack-summary { background: linear-gradient(135deg, var(--purple-bg), #EDE0F7); border: 2px solid #C39BD3; border-radius: 18px; padding: 18px; margin: 12px 0 20px; }
.ps-title { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; color: var(--purple2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
.ps-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
.ps-row.total { font-weight: 800; color: var(--text); border-top: 1px solid #C39BD3; padding-top: 8px; margin-top: 4px; }
.ps-val { font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800; color: var(--purple); }
.ps-val.green { color: var(--green2); }
.ps-val.orange { color: var(--orange); }

/* ── HERO ── */
.hero-splash { background: linear-gradient(160deg, var(--orange) 0%, #E91E8C 50%, var(--purple) 100%); padding: 24px 20px 28px; position: relative; overflow: hidden; }
.hero-splash::before { content: ''; position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; background: rgba(255,255,255,0.06); border-radius: 50%; }
.hero-greeting { font-size: 13px; color: rgba(255,255,255,0.75); font-weight: 600; margin-bottom: 2px; }
.hero-name { font-family: 'Nunito', sans-serif; font-size: 26px; font-weight: 900; color: #fff; margin-bottom: 18px; }
.streak-bar { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.15); border-radius: 14px; padding: 10px 14px; margin-bottom: 14px; }
.streak-count { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; color: var(--yellow); }
.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.stat-pill { background: rgba(255,255,255,0.18); border-radius: 14px; padding: 12px 8px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
.stat-num { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 900; color: #fff; line-height: 1; margin-bottom: 3px; }
.stat-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.7); }

/* ── ACTION CARDS ── */
.action-section { padding: 18px 20px 0; }
.section-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.section-title { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 800; color: var(--text); }
.see-all { font-size: 13px; font-weight: 700; color: var(--orange); cursor: pointer; }
.action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 22px; }
.action-card { border-radius: 20px; padding: 18px 14px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
.action-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.action-card.maestro { background: linear-gradient(135deg, #EAFAF1, #D5F5E3); border-color: #A9DFBF; }
.action-card.allievo { background: linear-gradient(135deg, #FFF4EF, #FDEBD0); border-color: #FAD7A0; }
.ac-emoji { font-size: 30px; margin-bottom: 10px; display: block; }
.ac-role { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 8px; border-radius: 8px; display: inline-block; margin-bottom: 8px; }
.ac-role.m { background: rgba(46,204,113,0.2); color: var(--green2); }
.ac-role.a { background: rgba(255,107,53,0.2); color: var(--orange); }
.ac-title { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.ac-desc { font-size: 11px; color: var(--text2); line-height: 1.4; }
.comp-card { background: var(--white); border: 2px solid var(--border); padding: 14px; border-radius: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); }
.comp-avatar { width: 42px; height: 42px; min-width: 42px; border-radius: 14px; background: linear-gradient(135deg, var(--purple), var(--orange)); display: flex; align-items: center; justify-content: center; font-size: 20px; }
.comp-title { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 2px; }
.comp-sub { font-size: 11px; color: var(--text2); }
.comp-zone { font-size: 10px; color: var(--orange); font-weight: 700; margin-top: 2px; }
.comp-badge { background: linear-gradient(135deg, var(--purple), var(--purple2)); color: #fff; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 900; padding: 6px 10px; border-radius: 10px; white-space: nowrap; margin-left: auto; }

/* ── BOTTOM NAV ── */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--white); border-top: 2px solid var(--border); display: flex; z-index: 200; padding: 4px 0 8px; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 4px 4px; cursor: pointer; }
.nav-icon { font-size: 22px; margin-bottom: 2px; }
.nav-lbl { font-size: 9px; font-weight: 700; color: var(--text3); letter-spacing: 0.05em; }
.nav-item.active .nav-lbl { color: var(--orange); }
.nav-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--orange); margin-top: 3px; }

/* ── CATALOGO ── */
.cat-header { background: var(--white); padding: 14px 20px 12px; border-bottom: 2px solid var(--border); }
.cat-title { font-family: 'Nunito', sans-serif; font-size: 19px; font-weight: 900; color: var(--text); margin-bottom: 12px; }
.search-wrap { position: relative; margin-bottom: 10px; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; }
.search-input { width: 100%; background: var(--surface); border: 2px solid var(--border); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; padding: 11px 16px 11px 40px; border-radius: 14px; outline: none; box-sizing: border-box; }
.search-input:focus { border-color: var(--orange); }
.filters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.filter-sel { background: var(--surface); border: 2px solid var(--border); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; padding: 9px 12px; border-radius: 12px; width: 100%; outline: none; appearance: none; cursor: pointer; }

/* ── MAESTRO CARD ── */
.maestro-card { background: var(--white); border: 2px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 16px; box-shadow: var(--shadow); transition: all 0.2s; }
.maestro-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.mc-photo { height: 80px; display: flex; align-items: center; justify-content: center; position: relative; }
.mc-initials { font-family: 'Nunito', sans-serif; font-size: 34px; font-weight: 900; color: rgba(255,255,255,0.9); }
.mc-skilly { position: absolute; top: 10px; right: 10px; background: var(--white); border-radius: 12px; padding: 4px 10px; display: flex; align-items: center; gap: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.mcs-val { font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 900; color: var(--purple); }
.mcs-lbl { font-size: 9px; color: var(--text2); font-weight: 600; }
.mc-body { padding: 14px 16px; }
.mc-name { font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 2px; }
.mc-area { font-size: 12px; color: var(--text2); font-weight: 600; margin-bottom: 6px; }
.mc-desc { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 10px; }
.mc-meta { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.meta-chip { display: flex; align-items: center; gap: 4px; background: var(--surface); border: 1.5px solid var(--border); padding: 3px 8px; border-radius: 8px; font-size: 11px; font-weight: 600; color: var(--text2); }
.meta-chip.zona { border-color: var(--orange); color: var(--orange); background: var(--orange-bg); }
.stars { color: #F1C40F; font-size: 11px; }
.prenota-btn { width: 100%; background: linear-gradient(135deg, var(--orange), var(--orange2)); color: #fff; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; padding: 12px; border: none; border-radius: 14px; cursor: pointer; transition: all 0.2s; }
.prenota-btn:hover { transform: translateY(-1px); }
.blocco-btn { width: 100%; background: var(--surface); color: var(--text3); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; padding: 12px; border: 2px dashed var(--border); border-radius: 14px; cursor: not-allowed; }

// ── STEP 2 ──
function Step2({onNext,onBack}) {
  const [doc,setDoc]=useState('idle');
  const [selfie,setSelfie]=useState('idle');
  const sim=setter=>{setter('loading');setTimeout(()=>setter('done'),1800);};
  const Box=({stato,onTap,icon,label,note})=>(
    <div className={`kyc-box ${stato}`} onClick={()=>stato==='idle'&&onTap()}>
      <div className="kyc-icon">{stato==='loading'?'⏳':stato==='done'?'✅':icon}</div>
      <p className="kyc-label">
        {stato==='idle'&&<>{label}<span className="kyc-note">{note}</span></>}
        {stato==='loading'&&<span style={{color:'#9B59B6',fontWeight:'700'}}>Caricamento in corso...</span>}
        {stato==='done'&&<span style={{color:'#27AE60',fontWeight:'700'}}>Caricato con successo ✓</span>}
      </p>
    </div>
  );
  return (
    <div>
      <Topbar steps currentStep={2}/>
      <div className="content">
        <div className="step-pill">🔐 Passo 2 di 3</div>

// ── SELEZIONE PACCHETTO ──
function SelezionaPacchetto({maestro, onConferma, onBack}) {
  const [selected, setSelected] = useState('singola');
  const sk = maestro.skilly;
  const pacchetti = {
    singola: { label:'Sessione singola', lezioni:1, bonus_m:0, bonus_a:0, color:'selected', badge:'pb-orange', check:'pc-orange' },
    p5: { label:'Pacchetto 5 lezioni', lezioni:5, bonus_m:15, bonus_a:8, color:'selected-green', badge:'pb-green', check:'pc-green', best:false },
    p10: { label:'Pacchetto 10 lezioni', lezioni:10, bonus_m:40, bonus_a:20, color:'selected-purple', badge:'pb-purple', check:'pc-purple', best:true },
  };
  const calcSkilly = (tipo) => {
    const p = pacchetti[tipo];
    const base = sk * p.lezioni;
    const mBonus = Math.round(base * p.bonus_m / 100);
    const aBonus = Math.round(base * p.bonus_a / 100);
    return { base, mTotal: base + mBonus, mBonus, aBonus };
  };
  const c = calcSkilly(selected);
  const p = pacchetti[selected];
  return (
    <div style={{paddingBottom:'40px'}}>
      <Topbar onBack={onBack}/>
      <div style={{padding:'20px'}}>
        <div className="step-pill">📦 Tipo di prenotazione</div>
        <h2 className="screen-title" style={{fontSize:'24px'}}>Scegli il<br/>pacchetto</h2>
        <p className="screen-sub">Il pacchetto da 10 lezioni conviene sempre di più — per te e per il Maestro.</p>
        <div className="pack-cards">
          {Object.entries(pacchetti).map(([key,pack])=>{
            const calc = calcSkilly(key);
            const isSel = selected===key;
            return (
              <div key={key} className={`pack-card ${isSel?pack.color:''}`} onClick={()=>setSelected(key)}>
                {pack.best&&<div className="pack-best">⭐ Più conveniente</div>}
                {isSel&&<div className={`pack-check ${pack.check}`}>✓</div>}
                <div className="pack-header">
                  <p className="pack-name">{pack.label}</p>
                  <span className={`pack-badge ${pack.badge}`}>{pack.lezioni} {pack.lezioni===1?'lezione':'lezioni'}</span>
                </div>
                <div className="pack-price">
                  <span className="pack-skilly">💎{calc.mTotal}</span>
                  <span className="pack-unit">Skilly al Maestro</span>
                </div>
                {pack.bonus_m>0&&<p className="pack-bonus">🎁 +{pack.bonus_m}% bonus completamento Maestro · +{pack.bonus_a}% bonus Allievo</p>}
                {key==='singola'&&<p className="pack-desc">Pagamento singolo. Nessun bonus.</p>}
                {key==='p5'&&<p className="pack-desc">5 lezioni concordate. Pagamento lezione per lezione. Bonus al completamento.</p>}
                {key==='p10'&&<p className="pack-desc">10 lezioni concordate. Il massimo del valore per entrambi. Bonus doppio.</p>}
              </div>
            );
          })}
        </div>
        <div className="pack-summary">
          <p className="ps-title">💜 Riepilogo {p.label}</p>
          <div className="ps-row"><span>Skilly base ({p.lezioni} × {sk})</span><span className="ps-val">💎{c.base}</span></div>
          {c.mBonus>0&&<div className="ps-row"><span>Bonus Maestro (+{p.bonus_m}%)</span><span className="ps-val green">+{c.mBonus}</span></div>}
          {c.aBonus>0&&<div className="ps-row"><span>Bonus Allievo al completamento</span><span className="ps-val orange">💎+{c.aBonus}</span></div>}
          <div className="ps-row total"><span>Totale al Maestro</span><span className="ps-val">💎{c.mTotal}</span></div>
          {c.aBonus>0&&<p style={{fontSize:'11px',color:'#9B59B6',fontWeight:'600',marginTop:'8px'}}>🎁 Tu ricevi 💎+{c.aBonus} Skilly quando completi tutte le {p.lezioni} lezioni!</p>}
        </div>
        <button className="btn" onClick={()=>onConferma(selected, c)}>Continua con {p.label} →</button>
        <button className="btn-outline" onClick={onBack}>← Indietro</button>
      </div>
    </div>
  );
}

        <div className="row2">
          <div className="field"><label>Nome</label><input value={form.nome} onChange={e=>s('nome',e.target.value)}/></div>
          <div className="field"><label>Cognome</label><input value={form.cognome} onChange={e=>s('cognome',e.target.value)}/></div>
        </div>
        <div className="field"><label>Città</label><input value={form.citta} onChange={e=>s('citta',e.target.value)}/></div>
        <div className="field"><label>📍 Dove vuoi operare come Maestro?</label><select value={form.zona} onChange={e=>s('zona',e.target.value)} style={sel}>{ZONE.map(z=><option key={z} value={z}>{z}</option>)}</select></div>
        <div className="field"><label>Bio (opzionale)</label><textarea value={form.bio} onChange={e=>s('bio',e.target.value)} placeholder="Presentati brevemente..." rows={3} style={{resize:'vertical'}}/></div>
        <button className="btn" onClick={()=>{onUpdate(form);setEditing(false);}}>Salva modifiche →</button>
        <button className="btn-outline" onClick={()=>setEditing(false)}>Annulla</button>
      </div>
    </div>
  );
  return(
    <div style={{paddingBottom:'80px'}}>
      <div className="prof-header">
        <div className="prof-avatar">{(form.nome[0]||'P')+(form.cognome[0]||'G')}</div>
        <p className="prof-name">{form.nome} {form.cognome}</p>
        <p className="prof-city">📍 {form.citta}</p>
        <div className="prof-stats">
          <div className="prof-stat"><p className="ps-val">1</p><p className="ps-lbl">Sessioni</p></div>
          <div className="prof-stat"><p className="ps-val">9.4</p><p className="ps-lbl">Media</p></div>
          <div className="prof-stat"><p className="ps-val">{competenza?.skilly||0}</p><p className="ps-lbl">Skilly/h</p></div>
        </div>
      </div>
      <div className="prof-content">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
          <p className="section-title" style={{margin:0}}>Dati personali</p>
          <button className="edit-btn" onClick={()=>setEditing(true)}>✏️ Modifica</button>
        </div>
        {[['Nome',`${form.nome} ${form.cognome}`],['Città',form.citta],['Area operativa',`📍 ${form.zona}`]].map(([l,v])=>(
          <div key={l} className="prof-field"><p className="pf-label">{l}</p><p className="pf-val">{v}</p></div>
        ))}
        {form.bio&&<div className="prof-field"><p className="pf-label">Bio</p><p className="pf-val">{form.bio}</p></div>}
        <p className="section-title" style={{marginTop:'20px'}}>Le mie competenze</p>
        {competenze.length>0?competenze.map((c,i)=>(
          <div key={i} className="comp-card">
            <div className="comp-avatar">{LIVELLI[c.livello]?.emoji||'🎓'}</div>
            <div style={{flex:1}}><p className="comp-title">{c.desc||'Competenza'}</p><p className="comp-sub">{c.area} · {LIVELLI[c.livello]?.label}</p>{c.zona&&<p className="comp-zone">📍 {c.zona}</p>}</div>
            <div className="comp-badge">💎{c.skilly}<span style={{fontSize:'10px',opacity:.8}}>/h</span></div>
          </div>
        )):<p style={{fontSize:'14px',color:'#BDC3C7',marginBottom:'12px'}}>Nessuna competenza ancora.</p>}
        <button className="btn-outline" onClick={()=>setEditing('comp')}>+ Aggiungi competenza</button>
        <p className="section-title" style={{marginTop:'20px'}}>🏆 Achievement</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
          {[['🎓','Primo Maestro','Prima sessione erogata',true],['💎','Accumulatore','10 Skilly guadagnati',false],['⭐','Top Rated','Media sopra 9.0',false],['🔥','Streak','7 giorni consecutivi',false]].map(([e,t,d,done])=>(
            <div key={t} style={{background:done?'linear-gradient(135deg,#EAFAF1,#D5F5E3)':'#F8F9FA',border:`2px solid ${done?'#A9DFBF':'#ECF0F1'}`,borderRadius:'16px',padding:'14px',textAlign:'center',opacity:done?1:0.45}}>
              <p style={{fontSize:'26px',marginBottom:'6px'}}>{e}</p>
              <p style={{fontFamily:"'Nunito',sans-serif",fontSize:'12px',fontWeight:'800',color:'#2C3E50',marginBottom:'2px'}}>{t}</p>
              <p style={{fontSize:'10px',color:'#7F8C8D'}}>{d}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── DASHBOARD ──
function Dashboard({userData:initUD,competenza}) {
  const [tab,setTab]=useState('home');
  const [sub,setSub]=useState(null);
  const [pren,setPren]=useState(null);
  const [tipoPack,setTipoPack]=useState(null);
  const [calcPack,setCalcPack]=useState(null);
  const [sessErogate]=useState(1);
  const [wallet,setWallet]=useState(competenza?.skilly||8);
  const [userData,setUD]=useState(initUD);

  const handlePrenota=m=>{setPren({maestro:m});setSub('pack');};
  const handlePackSel=(tipo,calc)=>{setTipoPack(tipo);setCalcPack(calc);setSub('pren');};
  const handleConferma=d=>{setWallet(w=>Math.max(0,w-d.costo));setPren(d);setSub('conf');};
  const goHome=()=>{setSub(null);setTab('home');};

  if(sub==='pack') return <SelezionaPacchetto maestro={pren.maestro} onConferma={handlePackSel} onBack={()=>setSub(null)}/>;
  if(sub==='pren') return <Prenotazione maestro={pren.maestro} wallet={wallet} tipoPacchetto={tipoPack} calcoloSkilly={calcPack} onBack={()=>setSub('pack')} onConferma={handleConferma}/>;
  if(sub==='conf') return <ConfermaSessione prenotazione={pren} onHome={goHome}/>;

  const renderTab=()=>{
    if(tab==='catalogo') return <Catalogo wallet={wallet} sessioniErogate={sessErogate} onPrenota={handlePrenota}/>;
    if(tab==='sessioni') return <Sessioni competenza={competenza}/>;
    if(tab==='profilo') return <Profilo userData={userData} competenza={competenza} onUpdate={d=>setUD(p=>({...p,...d}))}/>;

            <div className="stat-pill"><p className="stat-num">💎{wallet}</p><p className="stat-lbl">Skilly</p></div>
            <div className="stat-pill"><p className="stat-num">{sessErogate}</p><p className="stat-lbl">Sessioni</p></div>
            <div className="stat-pill"><p className="stat-num">9.4</p><p className="stat-lbl">Media</p></div>
          </div>
        </div>
        <div className="action-section">
          <div className="section-hdr"><p className="section-title">Cosa vuoi fare?</p></div>
          <div className="action-grid">

              [<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="26" height="26"><path fillRule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" clipRule="evenodd"/></svg>,'Top Rated',false],

              <div key={t} style={{minWidth:'76px',background:done?'linear-gradient(135deg,#EAFAF1,#D5F5E3)':'#F8F9FA',border:`2px solid ${done?'#A9DFBF':'#ECF0F1'}`,borderRadius:'14px',padding:'12px 8px',textAlign:'center',opacity:done?1:0.4,flexShrink:0}}>

          ['profilo', <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path fillRule="evenodd" d="M18.685 19.097A9.723 9.723 0 0 0 21.75 12c0-5.385-4.365-9.75-9.75-9.75S2.25 6.615 2.25 12a9.723 9.723 0 0 0 3.065 7.097A9.716 9.716 0 0 0 12 21.75a9.716 9.716 0 0 0 6.685-2.653Zm-12.54-1.285A7.486 7.486 0 0 1 12 15a7.486 7.486 0 0 1 5.855 2.812A8.224 8.224 0 0 1 12 20.25a8.224 8.224 0 0 1-5.855-2.438ZM15.75 9a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" clipRule="evenodd"/></svg>, 'Profilo'],
        ].map(([id,icon,label])=>(
          <div key={id} className={`nav-item ${tab===id?'active':''}`} onClick={()=>setTab(id)}>
            <div style={{color:tab===id?'#FF6B35':'#BDC3C7',display:'flex',justifyContent:'center'}}>{icon}</div>
            <div className="nav-lbl">{label}</div>
            {tab===id&&<div className="nav-dot"/>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── APP ──
function App() {
  const [screen,setScreen]=useState('splash');
  const [ud,setUd]=useState({});
  const [comp,setComp]=useState({});
  return(
    <div className="app">
      {screen==='splash'&&<Splash onEntra={()=>setScreen('step1')}/>}
      {screen==='step1'&&<Step1 onNext={d=>{setUd(d);setScreen('step2');}}/>}
      {screen==='step2'&&<Step2 onNext={()=>setScreen('step3')} onBack={()=>setScreen('step1')}/>}
      {screen==='step3'&&<Step3 onNext={d=>{setComp(d);setScreen('benvenuto');}} onBack={()=>setScreen('step2')}/>}
      {screen==='benvenuto'&&<Benvenuto userData={ud} competenza={comp} onDashboard={()=>setScreen('dashboard')}/>}
      {screen==='dashboard'&&<Dashboard userData={ud} competenza={comp}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
