<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BOK — Barter Of Knowledge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --orange: #FF5C00;
    --orange-light: #FF7A2E;
    --orange-bg: #FFF3ED;
    --purple: #7C3AED;
    --purple-light: #9B6BF2;
    --purple-bg: #F3EEFF;
    --lime: #22C55E;
    --lime-bg: #EDFBF3;
    --text: #1A1A1A;
    --text-2: #555555;
    --text-3: #999999;
    --border: #E8E8E8;
    --surface: #FAFAFA;
    --white: #FFFFFF;
    --red: #EF4444;
  }
  html, body { height: 100%; background: #F0F0F0; font-family: 'Inter', sans-serif; }
  #root { min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; }
  .app { width: 100%; max-width: 430px; min-height: 100vh; background: var(--white); position: relative; }
  @media (min-width: 430px) {
    #root { align-items: center; padding: 20px; }
    .app { min-height: auto; max-height: 900px; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.12); border-radius: 24px; }
  }
  .topbar { background: var(--white); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .logo { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--orange); }
  .logo-tagline { font-size: 9px; color: var(--text-3); line-height: 1.3; margin-top: 1px; }
  .wallet-chip { display: flex; align-items: center; gap: 6px; background: var(--purple-bg); border: 1.5px solid var(--purple-light); padding: 6px 12px; border-radius: 20px; }
  .wallet-val { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--purple); }
  .wallet-label { font-size: 10px; color: var(--purple-light); font-weight: 500; }
  .pdots { display: flex; gap: 6px; }
  .pdot { width: 24px; height: 4px; border-radius: 2px; background: var(--border); transition: background 0.3s; }
  .pdot.active { background: var(--orange); }
  .pdot.done { background: var(--lime); }
  .content { padding: 28px 20px 40px; }
  .step-label { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--orange); margin-bottom: 8px; }
  .screen-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; line-height: 1.15; color: var(--text); margin-bottom: 8px; }
  .screen-sub { font-size: 14px; color: var(--text-2); margin-bottom: 28px; line-height: 1.6; }
  .field { margin-bottom: 16px; }
  .field label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-2); margin-bottom: 6px; display: block; }
  .field input, .field select, .field textarea { width: 100%; background: var(--surface); border: 1.5px solid var(--border); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; padding: 13px 16px; outline: none; border-radius: 12px; transition: border-color 0.2s; appearance: none; box-sizing: border-box; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,92,0,0.08); }
  .field input::placeholder { color: var(--text-3); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn { width: 100%; background: var(--orange); color: var(--white); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; padding: 16px; border: none; cursor: pointer; border-radius: 12px; display: block; margin-top: 8px; transition: background 0.2s; }
  .btn:hover { background: var(--orange-light); }
  .btn-purple { background: var(--purple); }
  .btn-purple:hover { background: var(--purple-light); }
  .btn-lime { background: var(--lime); }
  .btn-outline { width: 100%; background: transparent; border: 1.5px solid var(--border); color: var(--text-2); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; padding: 14px; cursor: pointer; border-radius: 12px; display: block; margin-top: 8px; }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .note { font-size: 12px; color: var(--text-3); text-align: center; margin-top: 10px; line-height: 1.5; }
  .link-text { text-align: center; font-size: 13px; color: var(--text-2); margin-top: 8px; }
  .link-text span { color: var(--orange); font-weight: 600; cursor: pointer; }
  .kyc-box { background: var(--surface); border: 2px dashed var(--border); padding: 22px 16px; text-align: center; margin-bottom: 14px; cursor: pointer; border-radius: 16px; transition: all 0.2s; }
  .kyc-box:hover { border-color: var(--orange); background: var(--orange-bg); }
  .kyc-box.done { border-color: var(--lime); background: var(--lime-bg); border-style: solid; }
  .kyc-box.loading { border-color: var(--purple); background: var(--purple-bg); }
  .kyc-icon { font-size: 28px; margin-bottom: 8px; }
  .kyc-label { font-size: 13px; color: var(--text-2); line-height: 1.5; }
  .kyc-note { font-size: 11px; color: var(--text-3); display: block; margin-top: 3px; }
  .skilly-box { background: var(--purple-bg); border: 1.5px solid var(--purple-light); padding: 16px 20px; border-radius: 16px; margin-top: 16px; display: flex; align-items: center; gap: 16px; }
  .skilly-val { font-family: 'Syne', sans-serif; font-size: 44px; font-weight: 800; color: var(--purple); line-height: 1; }
  .sl { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--purple-light); }
  .sd { font-size: 12px; color: var(--text-2); margin-top: 2px; line-height: 1.4; }
  .dash-hero { background: linear-gradient(135deg, var(--orange) 0%, var(--purple) 100%); padding: 24px 20px 28px; }
  .dash-greeting { font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 500; margin-bottom: 2px; }
  .dash-name { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--white); margin-bottom: 20px; }
  .dash-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat-card { background: rgba(255,255,255,0.15); padding: 12px; text-align: center; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); }
  .stat-val { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--white); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.7); }
  .dash-content { padding: 20px 20px 80px; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
  .action-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .action-card { background: var(--white); border: 1.5px solid var(--border); padding: 18px 14px; cursor: pointer; border-radius: 16px; transition: all 0.2s; }
  .action-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .action-card.maestro { border-top: 3px solid var(--lime); }
  .action-card.allievo { border-top: 3px solid var(--orange); }
  .ac-badge { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; margin-bottom: 10px; }
  .ac-badge.m { background: var(--lime-bg); color: var(--lime); }
  .ac-badge.a { background: var(--orange-bg); color: var(--orange); }
  .ac-icon { font-size: 22px; margin-bottom: 8px; }
  .ac-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .ac-desc { font-size: 11px; color: var(--text-3); line-height: 1.4; }
  .comp-card { background: var(--surface); border: 1.5px solid var(--border); padding: 14px 16px; border-radius: 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .comp-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .comp-area { font-size: 11px; color: var(--text-3); }
  .comp-skilly { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--purple); }
  .comp-skilly span { font-size: 10px; color: var(--text-3); font-family: 'Inter', sans-serif; font-weight: 400; }
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--white); border-top: 1px solid var(--border); display: flex; z-index: 20; }
  .nav-item { flex: 1; padding: 10px 8px 12px; text-align: center; cursor: pointer; }
  .nav-icon { font-size: 20px; margin-bottom: 2px; }
  .nav-label { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); }
  .nav-item.active .nav-label { color: var(--orange); }
  .search-bar { background: var(--surface); border: 1.5px solid var(--border); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; padding: 11px 16px; border-radius: 12px; width: 100%; outline: none; box-sizing: border-box; margin-bottom: 10px; }
  .search-bar:focus { border-color: var(--orange); }
  .filter-sel { background: var(--surface); border: 1.5px solid var(--border); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; padding: 10px 14px; border-radius: 12px; width: 100%; outline: none; appearance: none; box-sizing: border-box; }
  .maestro-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  .maestro-avatar { width: 42px; height: 42px; min-width: 42px; background: var(--orange-bg); border: 2px solid var(--orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; color: var(--orange); }
  .tag { display: inline-block; background: var(--surface); border: 1px solid var(--border); font-size: 10px; font-weight: 600; color: var(--text-2); padding: 3px 8px; border-radius: 6px; margin-right: 4px; }
  .tag.orange { background: var(--orange-bg); border-color: var(--orange); color: var(--orange); }
  .star { color: #FBBF24; font-size: 11px; }
  .back-btn { background: var(--surface); border: 1.5px solid var(--border); width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--text-2); flex-shrink: 0; }
  .riepilogo-box { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; margin: 8px 0 20px; }
  .riepilogo-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; color: var(--text-2); }
  .riepilogo-row:last-child { margin-bottom: 0; border-top: 1px solid var(--border); padding-top: 8px; font-weight: 600; }
  .blocco-banner { background: var(--orange-bg); border: 1.5px solid var(--orange); border-radius: 14px; padding: 14px 16px; margin: 16px 20px; display: flex; gap: 12px; }
  .profilo-header { background: linear-gradient(135deg, var(--orange) 0%, var(--purple) 100%); padding: 28px 20px; text-align: center; }
  .profilo-avatar { width: 72px; height: 72px; background: rgba(255,255,255,0.2); border: 3px solid rgba(255,255,255,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--white); margin: 0 auto 12px; }
  .profilo-field { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 13px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .profilo-field-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
  .profilo-field-val { font-size: 14px; color: var(--text); font-weight: 500; }
  .edit-chip { background: var(--orange-bg); color: var(--orange); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 8px; cursor: pointer; border: none; font-family: 'Inter', sans-serif; }
  .sessione-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  .sess-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 8px; margin-bottom: 10px; }
  .empty-state { text-align: center; padding: 48px 20px; }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .empty-desc { font-size: 13px; color: var(--text-3); line-height: 1.6; margin-bottom: 24px; }
  .conferma-screen { padding: 40px 20px; text-align: center; }
  .conferma-icon { width: 72px; height: 72px; background: var(--lime-bg); border: 3px solid var(--lime); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 28px; }
  .welcome-step { display: flex; gap: 14px; margin-bottom: 20px; align-items: flex-start; }
  .welcome-num { width: 32px; height: 32px; min-width: 32px; background: var(--orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; color: var(--white); }
  .wtitle { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .wdesc { font-size: 12px; color: var(--text-2); line-height: 1.5; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const LIVELLI = {
  '2':{label:'Scuola elementare',skilly:2},
  '5':{label:'Liceo standard',skilly:5},
  '8':{label:'Liceo avanzato / Triennale',skilly:8},
  '12':{label:'Magistrale',skilly:12},
  '20':{label:'Dottorato',skilly:20},
  '26':{label:'Professionista 10+ anni',skilly:26},
};
const ZONE = ['Tutta Italia','Nord Italia','Centro Italia','Sud Italia e Isole','Valle d\'Aosta','Piemonte','Lombardia','Trentino-Alto Adige','Veneto','Friuli-Venezia Giulia','Liguria','Emilia-Romagna','Toscana','Umbria','Marche','Lazio','Abruzzo','Molise','Campania','Puglia','Basilicata','Calabria','Sicilia','Sardegna'];
const MAESTRI = [
  {id:1,nome:'Sara Conti',area:'Matematica',macro:'istruzione',livello:'12',skilly:12,media:9.4,sessioni:34,zona:'Lombardia',desc:'Analisi, algebra lineare e statistica. Magistrale in Matematica alla Sapienza.'},
  {id:2,nome:'Luca Ferretti',area:'Python',macro:'informatica',livello:'8',skilly:8,media:8.7,sessioni:21,zona:'Tutta Italia',desc:'Python per principianti e intermedi. Data science e automazione.'},
  {id:3,nome:'Maria Esposito',area:'Inglese B2-C1',macro:'lingue',livello:'8',skilly:8,media:9.8,sessioni:67,zona:'Campania',desc:'Preparazione Cambridge, conversazione avanzata, business English.'},
  {id:4,nome:'Roberto Mancini',area:'Diritto del lavoro',macro:'giuridico',livello:'26',skilly:26,media:9.1,sessioni:18,zona:'Lazio',desc:'Avvocato specializzato. Contratti, licenziamenti, tutele sindacali.'},
  {id:5,nome:'Giulia Romano',area:'Chitarra classica',macro:'musica',livello:'20',skilly:20,media:9.6,sessioni:45,zona:'Toscana',desc:'Conservatorio di Milano. Tecnica classica, solfeggio, teoria musicale.'},
  {id:6,nome:'Andrea Bianchi',area:'Fotografia',macro:'arte',livello:'8',skilly:8,media:8.3,sessioni:12,zona:'Piemonte',desc:'Composizione, luce naturale, post-produzione Lightroom.'},
  {id:7,nome:'Chiara Lombardi',area:'Nutrizione sportiva',macro:'salute',livello:'20',skilly:20,media:9.2,sessioni:29,zona:'Tutta Italia',desc:'Biologa nutrizionista. Piani alimentari per sport amatoriale e agonistico.'},
  {id:8,nome:'Marco Venezia',area:'Marketing digitale',macro:'business',livello:'26',skilly:26,media:8.9,sessioni:41,zona:'Veneto',desc:'15 anni di esperienza. SEO, social media strategy, Google Ads.'},
];
function Stars({val}) {
  return <span className="star">{'★'.repeat(Math.floor(val/2))}{'☆'.repeat(5-Math.floor(val/2))} <span style={{color:'#999',fontSize:'11px'}}>{val}</span></span>;
}
function Topbar({showWallet,wallet,steps,currentStep,onBack}) {
  return (
    <div className="topbar">
      <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
        {onBack&&<button className="back-btn" onClick={onBack}>←</button>}
        <div>
          <div className="logo">BOK</div>
          <div className="logo-tagline">Insegna quello che sai.<br/>Impara quello che vuoi. Gratis.</div>
        </div>
      </div>
      {showWallet?<div className="wallet-chip"><span className="wallet-val">{wallet}</span><span className="wallet-label">Skilly</span></div>
      :steps?<div className="pdots">{[1,2,3].map(i=><div key={i} className={`pdot ${i<currentStep?'done':i===currentStep?'active':''}`}></div>)}</div>
      :null}
    </div>
  );
}
function Step1({onNext}) {
  const [f,setF]=useState({nome:'',cognome:'',nascita:'',email:'',password:'',citta:''});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return <div><Topbar steps currentStep={1}/>
    <div className="content">
      <p className="step-label">Passo 1 di 3</p>
      <h2 className="screen-title">Chi sei? 👋</h2>
      <p className="screen-sub">Iniziamo con i tuoi dati. Servono per verificare la tua identità e proteggere tutti gli utenti.</p>
      <div className="row2">
        <div className="field"><label>Nome</label><input type="text" placeholder="Mario" value={f.nome} onChange={e=>s('nome',e.target.value)}/></div>
        <div className="field"><label>Cognome</label><input type="text" placeholder="Rossi" value={f.cognome} onChange={e=>s('cognome',e.target.value)}/></div>
      </div>
      <div className="field"><label>Data di nascita</label><input type="date" value={f.nascita} onChange={e=>s('nascita',e.target.value)}/></div>
      <div className="field"><label>Email</label><input type="email" placeholder="mario@email.com" value={f.email} onChange={e=>s('email',e.target.value)}/></div>
      <div className="field"><label>Password</label><input type="password" placeholder="Minimo 8 caratteri" value={f.password} onChange={e=>s('password',e.target.value)}/></div>
      <div className="field"><label>Città</label><input type="text" placeholder="Roma" value={f.citta} onChange={e=>s('citta',e.target.value)}/></div>
      <button className="btn" onClick={()=>onNext(f)}>Avanti →</button>
      <p className="note">🔒 I tuoi dati sono al sicuro. Nessuna cessione a terzi.</p>
      <div className="divider"/>
      <p className="link-text">Hai già un account? <span>Accedi</span></p>
    </div>
  </div>;
}
function Step2({onNext,onBack}) {
  const [doc,setDoc]=useState('idle');
  const [selfie,setSelfie]=useState('idle');
  const sim=setter=>{setter('loading');setTimeout(()=>setter('done'),1800);};
  const Box=({stato,onTap,icon,label,note})=>(
    <div className={`kyc-box ${stato}`} onClick={()=>stato==='idle'&&onTap()}>
      <div className="kyc-icon">{stato==='loading'?'⏳':stato==='done'?'✅':icon}</div>
      <p className="kyc-label">
        {stato==='idle'&&<>{label}<span className="kyc-note">{note}</span></>}
        {stato==='loading'&&<span style={{color:'#7C3AED',fontWeight:'600'}}>Caricamento in corso...</span>}
        {stato==='done'&&<span style={{color:'#22C55E',fontWeight:'600'}}>Caricato con successo ✓</span>}
      </p>
    </div>
  );
  return <div><Topbar steps currentStep={2}/>
    <div className="content">
      <p className="step-label">Passo 2 di 3</p>
      <h2 className="screen-title">Verifica identità 🪪</h2>
      <p className="screen-sub">BOK verifica chi sei prima di attivare il tuo account. È una misura di sicurezza per proteggere tutti.</p>
      <Box stato={doc} onTap={()=>sim(setDoc)} icon="🪪" label="Carica documento d'identità" note="Carta d'identità o passaporto — fronte e retro. Tocca per caricare."/>
      <Box stato={selfie} onTap={()=>sim(setSelfie)} icon="🤳" label="Scatta un selfie con il documento" note="Tieni il documento accanto al viso. Tocca per scattare."/>
      <p className="note" style={{textAlign:'left',margin:'0 0 20px'}}>La verifica avviene entro 24 ore. Riceverai una email di conferma.</p>
      <button className="btn" onClick={onNext}>Avanti →</button>
      <button className="btn-outline" onClick={onBack}>← Indietro</button>
    </div>
  </div>;
}
function Step3({onNext,onBack}) {
  const [area,setArea]=useState('');
  const [livello,setLivello]=useState('');
  const [desc,setDesc]=useState('');
  const [zona,setZona]=useState('');
  const sk=livello?LIVELLI[livello]?.skilly:null;
  return <div><Topbar steps currentStep={3}/>
    <div className="content">
      <p className="step-label">Passo 3 di 3</p>
      <h2 className="screen-title">Cosa sai fare? 🎓</h2>
      <p className="screen-sub">Deposita la tua prima competenza. Da qui guadagni i tuoi Skilly — la valuta con cui imparerai da altri.</p>
      <div className="field"><label>Area di competenza</label>

    if(tab==='catalogo') return <Catalogo wallet={wallet} sessioniErogate={sessErogate} onPrenota={handlePrenota}/>;
    if(tab==='sessioni') return <Sessioni competenza={competenza}/>;
    if(tab==='profilo') return <Profilo userData={userData} competenza={competenza} onUpdate={d=>setUD(p=>({...p,...d}))}/>;
    return <div style={{paddingBottom:'80px'}}>
      <div className="dash-hero">
        <p className="dash-greeting">Bentornato 👋</p>
        <p className="dash-name">{userData?.nome||'Paolo'} {userData?.cognome||'Galli'}</p>
        <div className="dash-stats">
          <div className="stat-card"><p className="stat-val">{wallet}</p><p className="stat-label">Skilly</p></div>
          <div className="stat-card"><p className="stat-val">{sessErogate}</p><p className="stat-label">Sessioni</p></div>
          <div className="stat-card"><p className="stat-val">9.4</p><p className="stat-label">Media</p></div>
        </div>
      </div>
      <div className="dash-content">
        <p className="section-title">Cosa vuoi fare?</p>
        <div className="action-cards">
          <div className="action-card maestro" onClick={()=>setTab('sessioni')}>
            <div className="ac-badge m">Maestro</div><div className="ac-icon">📚</div>
            <p className="ac-title">Eroga lezione</p><p className="ac-desc">Vedi le prenotazioni ricevute e guadagna Skilly</p>
          </div>
          <div className="action-card allievo" onClick={()=>setTab('catalogo')}>
            <div className="ac-badge a">Allievo</div><div className="ac-icon">🔍</div>
            <p className="ac-title">Trova Maestro</p><p className="ac-desc">Cerca nel catalogo e prenota una sessione</p>
          </div>
        </div>
        <p className="section-title">Le mie competenze</p>
        {competenza?.area?<div className="comp-card">
          <div><p className="comp-title">{competenza.desc||'Competenza'}</p><p className="comp-area">{competenza.area} · {LIVELLI[competenza.livello]?.label}</p>{competenza.zona&&<p style={{fontSize:'11px',color:'#FF5C00',fontWeight:'600',marginTop:'2px'}}>📍 {competenza.zona}</p>}</div>
          <div className="comp-skilly">{competenza.skilly}<span>/h</span></div>
        </div>:<p style={{fontSize:'13px',color:'var(--text-3)',marginBottom:'12px'}}>Nessuna competenza depositata.</p>}
        <button className="btn-outline">+ Aggiungi competenza</button>
      </div>
    </div>;
  };
  return <div>
    {tab!=='profilo'&&<Topbar showWallet wallet={wallet}/>}
    <div>{renderTab()}</div>
    <div className="bottom-nav">
      {[['home','⌂','Home'],['catalogo','◫','Catalogo'],['sessioni','◷','Sessioni'],['profilo','◉','Profilo']].map(([id,icon,label])=>(
        <div key={id} className={`nav-item ${tab===id?'active':''}`} onClick={()=>setTab(id)}>
          <div className="nav-icon">{icon}</div><div className="nav-label">{label}</div>
        </div>
      ))}
    </div>
  </div>;
}
function App() {
  const [screen,setScreen]=useState('step1');
  const [ud,setUd]=useState({});
  const [comp,setComp]=useState({});
  return <div className="app">
    {screen==='step1'&&<Step1 onNext={d=>{setUd(d);setScreen('step2');}}/>}
    {screen==='step2'&&<Step2 onNext={()=>setScreen('step3')} onBack={()=>setScreen('step1')}/>}
    {screen==='step3'&&<Step3 onNext={d=>{setComp(d);setScreen('benvenuto');}} onBack={()=>setScreen('step2')}/>}
    {screen==='benvenuto'&&<Benvenuto userData={ud} competenza={comp} onDashboard={()=>setScreen('dashboard')}/>}
    {screen==='dashboard'&&<Dashboard userData={ud} competenza={comp}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
